# =========================================================================
# Compose principal: todos los servicios (frontend, backend, ai, mongo)
# corren en contenedores. Pensado para demo / despliegue.
#
# Para desarrollo local con hot reload del frontend usa:
#   docker compose -f docker-compose.dev.yml up --build
# =========================================================================

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-checkers}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-checkers}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-checkers}
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  ai-service:
    build:
      context: .
      dockerfile: apps/ai-service/Dockerfile
    restart: unless-stopped
    environment:
      AI_PORT: ${AI_PORT:-4100}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-please-change-me}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_ENV: ${SERVICE_ENV:-development}
    expose:
      - "4100"
    # No publicamos el puerto fuera: el backend habla por la red interna.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4100/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-4000}
      MONGO_URL: ${MONGO_URL:-mongodb://checkers:checkers@mongo:27017/checkers?authSource=admin}
      AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:4100}
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN:-please-change-me}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
      CLERK_JWT_TEMPLATE: ${CLERK_JWT_TEMPLATE:-checkers-backend}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PRICE_PREMIUM: ${STRIPE_PRICE_PREMIUM:-}
      STRIPE_SUCCESS_URL: ${STRIPE_SUCCESS_URL:-http://localhost:3000/premium?status=success}
      STRIPE_CANCEL_URL: ${STRIPE_CANCEL_URL:-http://localhost:3000/premium?status=cancel}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SERVICE_ENV: ${SERVICE_ENV:-development}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://localhost:4000}
        PUBLIC_BACKEND_WS_URL: ${PUBLIC_BACKEND_WS_URL:-ws://localhost:4000/ws}
        CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      PUBLIC_BACKEND_URL: ${PUBLIC_BACKEND_URL:-http://localhost:4000}
      PUBLIC_BACKEND_WS_URL: ${PUBLIC_BACKEND_WS_URL:-ws://localhost:4000/ws}
      CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  mongo_data:
