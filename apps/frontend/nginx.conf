server {
  listen 3000;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback: cualquier ruta no encontrada cae a index.html para que
  # TanStack Router se encargue del enrutamiento del lado del cliente.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Caché agresiva para assets versionados.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # Sin caché para index.html (debe reflejar el último build).
  location = /index.html {
    add_header Cache-Control "no-store, must-revalidate";
  }
}
